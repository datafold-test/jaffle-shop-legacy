version: 2

sources:
  - name: jaffle_raw
    database: JAFFLE_SHOP
    schema: RAW
    description: >
      Raw e-commerce tables shared between the legacy project and the
      translated dbt project. Fivetran-managed; both pipelines transform
      these into their own downstream tables.
    tables:
      - name: raw_customers
      - name: raw_orders
      - name: raw_items
      - name: raw_products
      - name: raw_supplies
