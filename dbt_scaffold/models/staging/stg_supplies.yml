version: 2

models:
  - name: stg_supplies
    description: >
      One row per supply (ingredient / packaging item) tied to a product SKU.
      Renamed and dollar-converted from raw_supplies.
    columns:
      - name: supply_id
        description: Surrogate key — md5(id || '-' || sku) from raw_supplies.
        tests:
          - not_null
          - unique
      - name: supply_uuid
        description: Natural key carried over from raw_supplies.id. Note — not unique because each supply item can be used across multiple product SKUs (the composite key is supply_id = md5(id || '-' || sku)).
        tests:
          - not_null
      - name: supply_name
        description: Display name of the supply.
      - name: product_id
        description: SKU of the product this supply belongs to (FK to stg_products.product_id).
      - name: supply_cost_cents
        description: Original cost in cents from raw_supplies (audit column).
      - name: supply_cost
        description: Cost in dollars (cents_to_dollars(cost)).
      - name: is_perishable_supply
        description: Boolean flag — true if the supply is perishable.
