version: 2

models:
  - name: stg_supplies
    description: >
      Staging model for supplies. Consolidates the legacy DDL
      (10_stg_supplies_ddl.sql) and DML (10_stg_supplies_dml.sql) into a
      single dbt view. Each row represents one supply item used in
      jaffle preparation.
    columns:
      - name: supply_id
        description: Surrogate primary key derived from md5(concat(id, '-', sku)).
        tests:
          - not_null
          - unique

      - name: supply_uuid
        description: Original supply ID from the raw source.
        tests:
          - not_null

      - name: supply_name
        description: Human-readable name of the supply.

      - name: product_id
        description: SKU / product identifier this supply is associated with.

      - name: supply_cost_cents
        description: Raw cost of the supply in cents (audit column).

      - name: supply_cost
        description: Cost of the supply in dollars (supply_cost_cents / 100).

      - name: is_perishable_supply
        description: Boolean flag indicating whether the supply is perishable.
