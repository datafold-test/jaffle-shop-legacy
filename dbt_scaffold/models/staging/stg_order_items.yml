version: 2

models:
  - name: stg_order_items
    description: One row per order line item, with renamed surrogate keys.
    columns:
      - name: order_item_id
        description: Surrogate key for the order item (renamed from raw_items.id).
        tests:
          - not_null
          - unique
      - name: order_id
        description: FK to stg_orders.order_id.
        tests:
          - not_null
      - name: product_id
        description: FK to stg_products.product_id (renamed from raw_items.sku).
        tests:
          - not_null
