version: 2

models:
  - name: stg_order_items
    description: >
      Staging layer for order line items. One row per item on an order.
      Pure rename of jaffle_raw.raw_items (ID → order_item_id, SKU → product_id).
    columns:
      - name: order_item_id
        description: Primary key — unique identifier for an order line item.
        tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to stg_orders.order_id.
        tests:
          - not_null
      - name: product_id
        description: Foreign key to stg_products.product_id (legacy SKU).
        tests:
          - not_null
