version: 2

models:
  - name: stg_order_items
    description: >
      Staging-layer order items. Renames ID to order_item_id and preserves
      the foreign key relationships to orders and products.
    columns:
      - name: order_item_id
        description: Unique identifier for the order item (renamed from raw ID)
        tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to the associated order
        tests:
          - not_null
      - name: product_id
        description: Foreign key to the associated product (SKU from raw table)
        tests:
          - not_null
