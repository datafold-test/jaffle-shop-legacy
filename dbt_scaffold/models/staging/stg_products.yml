version: 2

models:
  - name: stg_products
    description: >
      Staging model for products. Renames SKU → product_id, converts price
      from cents to dollars, and derives is_food_item / is_drink_item boolean
      flags from product_type.
    columns:
      - name: product_id
        description: Unique product identifier (renamed from SKU in the raw table).
        tests:
          - not_null
          - unique

      - name: product_name
        description: Display name of the product.
        tests:
          - not_null

      - name: product_type
        description: Product type/category (e.g. 'jaffle', 'beverage').
        tests:
          - not_null

      - name: product_description
        description: Free-text description of the product.

      - name: product_price_cents
        description: Raw price in cents, preserved for auditing.

      - name: product_price
        description: Product price in dollars (converted from cents via cents_to_dollars macro).

      - name: is_food_item
        description: True when product_type = 'jaffle', false otherwise.

      - name: is_drink_item
        description: True when product_type = 'beverage', false otherwise.
