version: 2

models:
  - name: stg_orders
    description: >
      One row per order placed at a Jaffle Shop location. Renames the POS
      columns to the analytics naming convention, preserves cent-denominated
      audit columns, and exposes dollar variants for downstream marts.
    columns:
      - name: order_id
        description: Surrogate key — order UUID from the POS.
        tests:
          - not_null
          - unique
      - name: location_id
        description: FK to the store/location dimension.
        tests:
          - not_null
      - name: customer_id
        description: FK to the customer dimension.
        tests:
          - not_null
      - name: subtotal_cents
        description: Order subtotal in cents (audit column — divergence is warn-only).
      - name: tax_paid_cents
        description: Tax paid in cents (audit column — divergence is warn-only).
      - name: order_total_cents
        description: Order total in cents (audit column — divergence is warn-only).
      - name: subtotal
        description: Order subtotal in dollars (numeric(18,2)).
      - name: tax_paid
        description: Tax paid in dollars (numeric(18,2)).
      - name: order_total
        description: Order total in dollars (numeric(18,2)).
      - name: ordered_at
        description: Date the order was placed, truncated to day.
