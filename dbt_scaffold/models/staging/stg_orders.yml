version: 2

models:
  - name: stg_orders
    description: >
      Order header rows from the POS, with column names normalized and money
      columns expressed in both cents (audit) and dollars (analytics).
    columns:
      - name: order_id
        description: Surrogate key — order UUID from the POS.
        data_tests:
          - not_null
          - unique
      - name: location_id
        description: FK to the store/location that took the order.
        data_tests:
          - not_null
      - name: customer_id
        description: FK to the customer who placed the order.
        data_tests:
          - not_null
      - name: subtotal_cents
        description: Pre-tax order subtotal, in cents (preserved from RAW_ORDERS for audit).
      - name: tax_paid_cents
        description: Sales tax charged on the order, in cents (preserved for audit).
      - name: order_total_cents
        description: Order grand total including tax, in cents (preserved for audit).
      - name: subtotal
        description: Pre-tax order subtotal, in dollars.
      - name: tax_paid
        description: Sales tax charged on the order, in dollars.
      - name: order_total
        description: Order grand total including tax, in dollars.
      - name: ordered_at
        description: Date the order was placed (timestamp truncated to day).
