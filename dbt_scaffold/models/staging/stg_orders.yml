version: 2

models:
  - name: stg_orders
    description: >
      Staged orders from the raw POS data. Renames columns to the analytics
      naming convention and converts cents to dollars for money columns.
    columns:
      - name: order_id
        description: Unique identifier for the order.
        tests:
          - not_null
          - unique
      - name: location_id
        description: Identifier for the store/location where the order was placed.
      - name: customer_id
        description: Identifier for the customer who placed the order.
      - name: subtotal_cents
        description: Raw subtotal amount in cents (audit column).
      - name: tax_paid_cents
        description: Raw tax paid in cents (audit column).
      - name: order_total_cents
        description: Raw order total in cents (audit column).
      - name: subtotal
        description: Subtotal amount in dollars.
      - name: tax_paid
        description: Tax paid in dollars.
      - name: order_total
        description: Order total in dollars.
      - name: ordered_at
        description: Date the order was placed (truncated to day).
