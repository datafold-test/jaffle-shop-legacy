version: 2

models:
  - name: order_items
    description: >
      One row per order item, enriched with order timestamp, product attributes,
      and total supply cost rolled up per product. Grain: one row per order_item_id.
      Translated from JAFFLE_LEGACY_DB.PUBLIC.ORDER_ITEMS_ENRICHED.
    columns:
      - name: order_item_id
        description: Primary key — unique identifier for the order item.
        tests:
          - not_null
          - unique

      - name: order_id
        description: Foreign key to stg_orders — the parent order this item belongs to.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: ordered_at
        description: Day the parent order was placed (day-truncated timestamp from stg_orders).
        tests:
          - not_null

      - name: product_id
        description: Foreign key to stg_products — the SKU / product ordered.
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

      - name: product_name
        description: Display name of the product.
        tests:
          - not_null

      - name: product_price
        description: Unit price of the product in dollars (cents-to-dollars conversion applied upstream in stg_products).
        tests:
          - not_null

      - name: is_food_item
        description: True when the product type is 'jaffle' (a food item), false otherwise.
        tests:
          - not_null

      - name: is_drink_item
        description: True when the product type is 'beverage' (a drink item), false otherwise.
        tests:
          - not_null

      - name: supply_cost
        description: >
          Sum of supply_cost across all supplies tied to this product_id (in dollars,
          cents-to-dollars conversion applied upstream in stg_supplies).
          Null when the product has no associated supplies.
