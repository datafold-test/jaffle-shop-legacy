version: 2

models:
  - name: order_items
    description: >
      Mart model enriching each order item with product details and supply costs.
      Translated from legacy ORDER_ITEMS_ENRICHED. Each row is one order item,
      joined to its parent order, product details, and aggregated supply cost for
      that product SKU.
    columns:
      - name: order_item_id
        description: Primary key. Unique identifier for each order item.
        tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to the parent order.
        tests:
          - not_null
      - name: ordered_at
        description: Day-truncated timestamp when the parent order was placed.
      - name: product_id
        description: Foreign key to the product purchased.
        tests:
          - not_null
      - name: product_name
        description: Name of the product.
      - name: product_price
        description: Dollar price of the product at time of purchase.
      - name: is_food_item
        description: Boolean flag indicating whether this product is a food item.
        tests:
          - not_null
      - name: is_drink_item
        description: Boolean flag indicating whether this product is a drink item.
        tests:
          - not_null
      - name: supply_cost
        description: >
          Total supply cost for this product SKU (sum of all supply costs for the
          product). Nullable — null when no supply records exist for the product.
