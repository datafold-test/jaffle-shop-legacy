version: 2

models:
  - name: order_items
    description: Mart layer enriched order items with product details and supply costs
    columns:
      - name: order_item_id
        description: Order item identifier (primary key)
        tests:
          - not_null
          - unique

      - name: order_id
        description: Order identifier (foreign key to orders)
        tests:
          - not_null

      - name: ordered_at
        description: Order timestamp (truncated to day)
        tests:
          - not_null

      - name: product_id
        description: Product identifier (foreign key to products)
        tests:
          - not_null

      - name: product_name
        description: Product name
        tests:
          - not_null

      - name: product_price
        description: Product price in dollars
        tests:
          - not_null

      - name: is_food_item
        description: Boolean flag indicating if product is a jaffle (food item)
        tests:
          - not_null

      - name: is_drink_item
        description: Boolean flag indicating if product is a beverage (drink item)
        tests:
          - not_null

      - name: supply_cost
        description: Total supply cost for this product (aggregated from all supplies). May be NULL if product has no supplies.
