version: 2

models:
  - name: order_items
    description: >
      One row per order item. Each item carries its product metadata
      (name, price, food/drink flags) and the total supply cost
      rolled up per SKU. Built from stg_order_items joined to
      stg_orders, stg_products, and an aggregated stg_supplies.
    columns:
      - name: order_item_id
        description: Primary key — surrogate id of the order item.
        tests:
          - not_null
          - unique
      - name: order_id
        description: FK to orders.order_id.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: ordered_at
        description: Day-truncated timestamp when the order was placed (inherited from stg_orders).
        tests:
          - not_null
      - name: product_id
        description: FK to stg_products.product_id.
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: product_name
        description: Human-readable name from stg_products.
        tests:
          - not_null
      - name: product_price
        description: Per-unit product price in dollars (already converted upstream).
        tests:
          - not_null
      - name: is_food_item
        description: True if the product is a jaffle (food).
        tests:
          - not_null
      - name: is_drink_item
        description: True if the product is a beverage.
        tests:
          - not_null
      - name: supply_cost
        description: >
          Total supply cost per product (sum across all supply lines
          for this SKU) in dollars. May be NULL if a product has no
          supplies (LEFT JOIN to the per-product roll-up).
