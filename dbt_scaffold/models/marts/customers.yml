version: 2

models:
  - name: customers
    description: >
      Mart model computing per-customer lifetime metrics: order counts,
      repeat-buyer flag, first/last ordered_at, and lifetime spend, tax,
      and cost. Translated from the legacy JAFFLE_LEGACY_DB.PUBLIC.CUSTOMERS_SUMMARY
      table produced by legacy/20_customers_summary.sql.
    columns:
      - name: customer_id
        description: Unique identifier for each customer (primary key).
        tests:
          - not_null
          - unique

      - name: customer_name
        description: Full name of the customer.

      - name: count_lifetime_orders
        description: Total number of distinct orders placed by the customer. Defaults to 0 for customers with no orders.

      - name: is_repeat_buyer
        description: True when the customer has placed more than one order. Defaults to false for customers with no orders.

      - name: first_ordered_at
        description: Date of the customer's first order.

      - name: last_ordered_at
        description: Date of the customer's most recent order.

      - name: lifetime_spend_pretax
        description: Cumulative order subtotal (before tax) across all orders, in dollars. Defaults to 0 for customers with no orders.

      - name: lifetime_tax_paid
        description: Cumulative tax paid across all orders, in dollars. Defaults to 0 for customers with no orders.

      - name: lifetime_spend
        description: Cumulative total spend (including tax) across all orders, in dollars. Defaults to 0 for customers with no orders.
